<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>Operator SAPA Bogorejo</title>
<style>
*{ margin:0; padding:0; box-sizing:border-box; font-family:'Segoe UI',sans-serif; }
body{ background:#eef4f8; height:100vh; overflow:hidden; }
header{ height:70px; background:#0f766e; display:flex; justify-content:space-between; align-items:center; padding:0 25px; color:white; box-shadow:0 5px 20px rgba(0,0,0,.15); }
header h1{ font-size:30px; font-weight:bold; }
#jam{ font-size:18px; }
.container{ display:grid; grid-template-columns:340px 1fr 330px; height:calc(100vh - 70px); }
.left{ background:white; padding:20px; overflow:auto; border-right:1px solid #ddd; }
.left h2{ margin-bottom:20px; color:#0f172a; }
#jumlah{ color:#16a34a; font-weight:bold; }
.antrian{ padding:16px; background:#f8fafc; border-radius:15px; margin-bottom:12px; cursor:pointer; transition:.25s; border:2px solid transparent; }
.antrian:hover{ background:#dcfce7; border-color:#22c55e; }
.antrian.active{ background:#16a34a; color:white; }
.center{ display:flex; justify-content:center; align-items:center; padding:30px; }
.card{ width:100%; max-width:720px; background:white; padding:35px; border-radius:25px; box-shadow:0 10px 30px rgba(0,0,0,.15); }
.status{ display:inline-block; padding:10px 25px; background:#64748b; color:white; border-radius:50px; font-size:18px; margin-bottom:20px; text-transform:uppercase; font-weight:bold; }
.status.dipanggil { background: #16a34a; }
#nama{ font-size:48px; font-weight:bold; margin-bottom:10px; color:#0f172a; }
#desa{ font-size:28px; color:#64748b; margin-bottom:25px; }
.info{ width:100%; border-collapse:collapse; }
.info td{ padding:12px; font-size:19px; border-bottom:1px solid #eee; }
.info td:first-child{ width:170px; font-weight:bold; color:#475569; }
.right{ background:white; padding:20px; overflow:auto; border-left:1px solid #ddd; }
.right h2{ margin-bottom:15px; color:#0f172a; }
.btn{ width:100%; padding:15px; margin-bottom:12px; border:none; border-radius:14px; font-size:18px; font-weight:bold; cursor:pointer; color:white; transition:.2s; display:block; text-align:center; }
.btn:hover:not(:disabled){ transform:scale(1.02); filter:brightness(1.1); }
.btn:disabled{ opacity:0.5; cursor:not-allowed; }
.next{background:#16a34a;} .repeat{background:#2563eb;} .done{background:#f59e0b;} .skip{background:#dc2626;}
.lab{background:#7c3aed;} .apotek{background:#0891b2;} .gizi{background:#14b8a6;} .imunisasi{background:#0284c7;}
.kia{background:#ec4899;} .mtbs{background:#9333ea;} .pm{background:#ea580c;} .poned{background:#475569;}
.gigi{background:#be123c;} .konseling{background:#6366f1;}
</style>
</head>
<body>

<header>
<h1 id="judul">🏥 SAPA BOGOREJO</h1>
<div id="jam">00:00:00</div>
</header>

<div class="container">
    <div class="left">
        <h2>Daftar Antrian (<span id="jumlah">0</span>)</h2>
        <div id="list">Memuat data...</div>
    </div>
    <div class="center">
        <div class="card">
            <div class="status" id="badge-status">OFFLINE</div>
            <div id="nama">BELUM ADA PASIEN</div>
            <div id="desa">-</div>
            <table class="info">
                <tr><td>ID</td><td id="id">-</td></tr>
                <tr><td>Keluhan</td><td id="keluhan">-</td></tr>
                <tr><td>Klaster</td><td id="klaster">-</td></tr>
                <tr><td>Status</td><td id="status">-</td></tr>
            </table>
        </div>
    </div>
    <div class="right">
        <h2>Aksi</h2>
        <button class="btn next action-btn">▶ Panggil Berikutnya</button>
        <button class="btn repeat action-btn">🔁 Panggil Ulang</button>
        <button class="btn done action-btn">✅ Selesai</button>
        <button class="btn skip action-btn">❌ Tidak Hadir</button>
        <hr style="margin:20px 0">
        <h2>Rujuk Internal</h2>
        <button class="btn lab action-btn">🧪 Laboratorium</button>
        <button class="btn apotek action-btn">💊 Apotek</button>
        <button class="btn gizi action-btn">🥗 Gizi</button>
        <button class="btn imunisasi action-btn">💉 Imunisasi</button>
        <button class="btn kia action-btn">👩 KIA</button>
        <button class="btn mtbs action-btn">👦 MTBS</button>
        <button class="btn pm action-btn">🦠 Penyakit Menular</button>
        <button class="btn poned action-btn">🚑 PONED</button>
        <button class="btn gigi action-btn">🦷 Gigi</button>
        <button class="btn konseling action-btn">🗣 Konseling</button>
    </div>
</div>

<script>
const API_URL="https://script.google.com/macros/s/AKfycbwBhOezrpPhLmFPeD2QG6nS7a_wjsAznK9eGCzKP2DdQ7bza93656Y4IvIxLYjaihUonQ/exec";
const params=new URLSearchParams(window.location.search);
const KLASTER=params.get("klaster") || "Klaster 3 Dewasa dan Lansia";
document.getElementById("judul").innerHTML="🏥 SAPA BOGOREJO - "+KLASTER;

let dataAntrianLokal = []; let pasienAktif=null; let sedangProses = false;

function updateJam(){ const now=new Date(); document.getElementById("jam").innerHTML=now.toLocaleDateString("id-ID")+" "+now.toLocaleTimeString("id-ID"); }
updateJam(); setInterval(updateJam,1000);

function setGlobalLoading(isLoading) { sedangProses = isLoading; document.querySelectorAll(".action-btn").forEach(btn => btn.disabled = isLoading); }

async function loadData(){
    if(sedangProses) return;
    try{
        const res=await fetch(API_URL); const data=await res.json(); dataAntrianLokal = data;
        const list=data.filter(item=>item.klaster===KLASTER && item.status==="Menunggu Klaster");
        document.getElementById("jumlah").innerHTML=list.length;
        let html="";
        list.forEach(item=>{
            const isActive = pasienAktif && pasienAktif.row === item.row ? "active" : "";
            html+=`<div class="antrian ${isActive}" data-row="${item.row}" onclick="pilih(${item.row})"><b>${item.sapaan} ${item.nama}</b><br><small>Desa ${item.desa}</small></div>`;
        });
        if(html==="") html="<center><br>Tidak ada antrian.</center>";
        document.getElementById("list").innerHTML=html;
        if(pasienAktif){ const target = data.find(x => x.row == pasienAktif.row); if(target) { pasienAktif = target; tampilkanDetailPasien(); } }
    }catch(err){ console.error(err); }
}

function pilih(row){
    if(sedangProses) return; const target = dataAntrianLokal.find(x => x.row == row); if(!target) return;
    pasienAktif=target; tampilkanDetailPasien();
    document.querySelectorAll(".antrian").forEach(x=>x.classList.remove("active"));
    const currentEl = document.querySelector(`.antrian[data-row='${row}']`); if(currentEl) currentEl.classList.add("active");
}

function tampilkanDetailPasien(){
    if(!pasienAktif) return;
    document.getElementById("id").innerHTML=pasienAktif.id; document.getElementById("nama").innerHTML=pasienAktif.sapaan+" "+pasienAktif.nama;
    document.getElementById("desa").innerHTML="Desa "+pasienAktif.desa; document.getElementById("keluhan").innerHTML=pasienAktif.keluhan || "-";
    document.getElementById("klaster").innerHTML=pasienAktif.klaster; document.getElementById("status").innerHTML=pasienAktif.status;
    const badge = document.getElementById("badge-status"); badge.innerText = pasienAktif.status; badge.className = "status " + pasienAktif.status.toLowerCase().replace(" ", "-");
}

function bersihkanPanel(){
    pasienAktif=null; document.getElementById("id").innerHTML="-"; document.getElementById("nama").innerHTML="BELUM ADA PASIEN";
    document.getElementById("desa").innerHTML="-"; document.getElementById("keluhan").innerHTML="-"; document.getElementById("klaster").innerHTML="-";
    document.getElementById("status").innerHTML="-"; const badge = document.getElementById("badge-status"); badge.innerText = "OFFLINE"; badge.className = "status";
    document.querySelectorAll(".antrian").forEach(x=>x.classList.remove("active"));
}

async function updateStatus(aksi){
    if(!pasienAktif){ alert("Silakan pilih pasien terlebih dahulu."); return; }
    setGlobalLoading(true);
    try {
        const formBody = new URLSearchParams(); formBody.append("aksi", aksi); formBody.append("row", pasienAktif.row);
        await fetch(API_URL,{ method:"POST", headers: { "Content-Type": "application/x-www-form-urlencoded;charset=utf-8" }, body: formBody.toString() });
        if(aksi === "selesai" || aksi === "lewati") { bersihkanPanel(); } else if(aksi === "panggil") { pasienAktif.status = "Dipanggil"; tampilkanDetailPasien(); }
    } catch(err) { alert("Gagal memperbarui status."); } finally { setGlobalLoading(false); await loadData(); }
}

function suara(){
    if(!pasienAktif) return; speechSynthesis.cancel();
    let teks = `${pasienAktif.sapaan} ${pasienAktif.nama} dari Desa ${pasienAktif.desa} dipersilakan menuju ruang ${pasienAktif.klaster}`;
    let u = new SpeechSynthesisUtterance(teks); u.lang = "id-ID"; u.rate = 0.85; u.pitch = 1; speechSynthesis.speak(u);
}

async function rujuk(klasterBaru){
    if(!pasienAktif){ alert("Pilih pasien terlebih dahulu."); return; }
    setGlobalLoading(true);
    try {
        const formBody = new URLSearchParams(); formBody.append("aksi", "pindah_klaster"); formBody.append("row", pasienAktif.row); formBody.append("klaster", klasterBaru);
        await fetch(API_URL,{ method:"POST", headers: { "Content-Type": "application/x-www-form-urlencoded;charset=utf-8" }, body: formBody.toString() });
        alert(`${pasienAktif.sapaan} ${pasienAktif.nama} berhasil dipindahkan ke ${klasterBaru}`);
        bersihkanPanel();
    } catch(err) { alert("Gagal merujuk pasien."); } finally { setGlobalLoading(false); await loadData(); }
}

document.querySelector(".next").onclick = async()=>{
    if(dataAntrianLokal.length > 0 && !pasienAktif) {
        const listTunggu = dataAntrianLokal.filter(item=>item.klaster===KLASTER && item.status==="Menunggu Klaster");
        if(listTunggu.length > 0) pilih(listTunggu[0].row);
    }
    await updateStatus("panggil"); suara();
};
document.querySelector(".repeat").onclick = ()=>{ suara(); };
document.querySelector(".done").onclick = async()=>{ await updateStatus("selesai"); };
document.querySelector(".skip").onclick = async()=>{ await updateStatus("lewati"); };

document.querySelector(".lab").onclick=()=>rujuk("Laboratorium");
document.querySelector(".apotek").onclick=()=>rujuk("Apotek");
document.querySelector(".gizi").onclick=()=>rujuk("Gizi");
document.querySelector(".imunisasi").onclick=()=>rujuk("Imunisasi");
document.querySelector(".kia").onclick=()=>rujuk("Klaster II Ibu dan Anak (KIA)");
document.querySelector(".mtbs").onclick=()=>rujuk("Klaster II Anak dan Remaja (MTBS)");
document.querySelector(".pm").onclick=()=>rujuk("Klaster IV Penyakit Menular");
document.querySelector(".poned").onclick=()=>rujuk("PONED");
document.querySelector(".gigi").onclick=()=>rujuk("Lintas Klaster (Gigi dan Mulut)");
document.querySelector(".konseling").onclick=()=>rujuk("Konseling");

loadData(); setInterval(loadData,4000);
setInterval(()=>{ let n=document.getElementById("nama"); if(pasienAktif) { n.style.transition=".2s"; n.style.transform="scale(1.02)"; setTimeout(()=>{ n.style.transform="scale(1)"; },250); } },5000);
</script>
</body>
</html>
